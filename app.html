    @keyframes spin { to { transform: rotate(360deg); } }

  function submit(e) {
    e.preventDefault();
    const g = OSPITI[user.trim().toLowerCase()];
    if (g && g.password === pass) {
      onLogin({ ...g, username: user.trim().toLowerCase() });
    } else {
      setErr('Credenziali non corrette. Contatta Giuseppe per assistenza.');
    }
  }

  const bubbles = [{s:130,t:8,l:8,dl:0},{s:80,t:15,l:75,dl:2},{s:170,t:55,l:3,dl:4},{s:60,t:45,l:82,dl:1},{s:100,t:78,l:45,dl:3}];

  return (
    <div className="login-page">
      {bubbles.map((b,i) => (
        <div key={i} className="bubble" style={{width:b.s,height:b.s,top:`${b.t}%`,left:`${b.l}%`,animationDelay:`${b.dl}s`}} />
      ))}
      <div className="login-card">
        <div className="login-logo">
          <span className="big-icon">🌊</span>
          <h1>Marina Azul 15</h1>
          <p>Vasto Marina — Benvenuto nel tuo soggiorno</p>
        </div>
        {err && <div className="login-error">⚠️ {err}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label>Nome utente</label>
            <input
              type="text" value={user}
              onChange={e=>{ setUser(e.target.value); setErr(''); }}
              placeholder="inserisci l'utente"
              autoCapitalize="none" autoCorrect="off" spellCheck="false"
            />
          </div>
          <div className="form-group">
            <label>Password</label>
            <input
              type="password" value={pass}
              onChange={e=>{ setPass(e.target.value); setErr(''); }}
              placeholder="••••••••"
            />
          </div>
          <button type="submit" className="login-btn">Accedi al tuo soggiorno →</button>
        </form>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   COMPONENTE: WeatherCard
═══════════════════════════════════════════════════════════ */
function WeatherCard() {
  const [w,   setW]   = useState(null);
  const [load,setLoad]= useState(true);
  const [err, setErr] = useState(false);

  useEffect(() => {
    fetch('https://api.open-meteo.com/v1/forecast?latitude=42.1099&longitude=14.7197&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code,apparent_temperature&timezone=Europe/Rome&forecast_days=1')
      .then(r => r.json())
      .then(d => { setW(d.current); setLoad(false); })
      .catch(() => { setErr(true); setLoad(false); });
  }, []);

  const today = new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});

  return (
    <div className="card">
      <div className="card-title">🌤️ Meteo oggi — Vasto Marina</div>
      {load && <div className="loading"><div className="spinner"/><br/>Caricamento meteo...</div>}
      {err  && <div className="loading" style={{color:'#c53030'}}>⚠️ Meteo non disponibile. Controlla la connessione.</div>}
      {w && !load && (() => {
        const info = wmo(w.weather_code);
        return <>
          <div style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'14px',textTransform:'capitalize'}}>{today}</div>
          <div className="weather-main">
            <div className="weather-emoji">{info.e}</div>
            <div>
              <div className="weather-temp">{Math.round(w.temperature_2m)}<sup>°C</sup></div>
              <div className="weather-desc">{info.d}</div>
            </div>
          </div>
          <div className="weather-grid">
            <div className="wdet"><div className="wdet-icon">🌡️</div><div><div className="wdet-label">Percepita</div><div className="wdet-val">{Math.round(w.apparent_temperature)}°C</div></div></div>
            <div className="wdet"><div className="wdet-icon">💧</div><div><div className="wdet-label">Umidità</div><div className="wdet-val">{w.relative_humidity_2m}%</div></div></div>
            <div className="wdet"><div className="wdet-icon">💨</div><div><div className="wdet-label">Vento</div><div className="wdet-val">{Math.round(w.wind_speed_10m)} km/h</div></div></div>
            <div className="wdet"><div className="wdet-icon">📍</div><div><div className="wdet-label">Posizione</div><div className="wdet-val" style={{fontSize:'12px'}}>Vasto Marina</div></div></div>
          </div>
        </>;
      })()}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   COMPONENTE: StayCard
═══════════════════════════════════════════════════════════ */
function StayCard({ guest }) {
  const now      = new Date(); now.setHours(0,0,0,0);
  const checkin  = new Date(guest.checkin);  checkin.setHours(0,0,0,0);
  const checkout = new Date(guest.checkout); checkout.setHours(0,0,0,0);
  const total    = Math.round((checkout - checkin)  / 86400000);
  const done     = Math.round((now - checkin)        / 86400000);
  const left     = daysFrom(guest.checkout);
  const pct      = Math.max(0, Math.min(100, (done / total) * 100));

  let bannerClass, bannerContent;
  if (left < 0) {
    bannerClass = "cb-done";
    bannerContent = <><div className="cb-label">Il tuo soggiorno è terminato</div><div className="cb-big">Grazie! 👋</div></>;
  } else if (left === 0) {
    bannerClass = "cb-checkout";
    bannerContent = <><div className="cb-big">Oggi è il check-out!</div><div className="cb-label">Entro le ore 10:00</div></>;
  } else if (now < checkin) {
    bannerClass = "cb-future";
    bannerContent = <><div className="cb-label">Al tuo check-in mancano</div><div className="cb-big">{daysFrom(guest.checkin)} giorni</div></>;
  } else {
    bannerClass = "cb-default";
    bannerContent = <><div className="cb-label">Notti rimanenti</div><div className="cb-big">{left}</div><div className="cb-label" style={{marginTop:'3px',opacity:0.85}}>Check-out {fmtDate(guest.checkout)}</div></>;
  }

  return (
    <div className="card">
      <div className="card-title">📅 Il tuo soggiorno</div>
      <div style={{fontSize:'16px',fontWeight:'800',color:'var(--blue-dark)',marginBottom:'14px'}}>
        Benvenuto/a, {guest.name}! 🎉
      </div>
      <div className="stay-grid">
        <div className="stay-cell">
          <div className="stay-cell-label">Check-in</div>
          <div className="stay-cell-val" style={{fontSize:'14px'}}>{fmtDate(guest.checkin)}</div>
          <div className="stay-cell-sub">dalle 15:00</div>
        </div>
        <div className="stay-cell">
          <div className="stay-cell-label">Check-out</div>
          <div className="stay-cell-val" style={{fontSize:'14px'}}>{fmtDate(guest.checkout)}</div>
          <div className="stay-cell-sub">entro le 10:00</div>
        </div>
        <div className="stay-cell">
          <div className="stay-cell-label">Durata</div>
          <div className="stay-cell-val">{total}</div>
          <div className="stay-cell-sub">notti</div>
        </div>
        <div className="stay-cell">
          <div className="stay-cell-label">Trascorse</div>
          <div className="stay-cell-val">{Math.max(0, done)}</div>
          <div className="stay-cell-sub">di {total}</div>
        </div>
      </div>
      {total > 0 && now >= checkin && now <= checkout && (
        <>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
          <div className="progress-label">{Math.round(pct)}% del soggiorno completato</div>
        </>
      )}
      <div className={`countdown-banner ${bannerClass}`}>{bannerContent}</div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   TABS CONTENT
═══════════════════════════════════════════════════════════ */
function CasaTab() {
  return (
    <div className="card">
      <div className="card-title">🏠 Informazioni Casa</div>

          <div className="info-icon">{item.icon}</div>

            <div className="info-lbl">{item.lbl}</div>
            {item.mono

              : <div className="info-val">{item.val}</div>
            }
          </div>
        </div>
      ))}
    </div>
  );
}

function RistorantiTab() {
  return (
    <div className="card">
      <div className="card-title">🍽️ Dove Mangiare</div>
      {RISTORANTI.map((r,i) => (
        <div className="rest-card" key={i}>
          <div className="rest-head">
            <div className="rest-name">{r.nome}</div>
            <div className="rest-price">{r.fascia}</div>
          </div>
          <div className="rest-tipo">{r.tipo}</div>
          <div className="rest-desc">{r.desc}</div>
          <a href={r.maps} target="_blank" rel="noopener noreferrer" className="maps-btn">📍 Apri in Maps</a>
        </div>
      ))}
    </div>
  );
}

function AttivitaTab() {
  return (
    <div className="card">
      <div className="card-title">🌊 Cosa Fare</div>
      {ATTIVITA.map((a,i) => (
        <div className="act-row" key={i}>
          <div className="act-emoji">{a.emoji}</div>
          <div>
            <div className="act-name">{a.nome}</div>
            <div className="act-desc">{a.desc}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function ContattiTab() {
  function href(tel) {
    if (/^[\d\s\+]+$/.test(tel)) return `tel:${tel.replace(/\s/g,'')}`;
    return '#';
  }
  return (
    <div className="card">
      <div className="card-title">📞 Numeri Utili</div>
      {CONTATTI.map((c,i) => (
        <a key={i} href={href(c.tel)} className={`contact-link${c.primary?' primary':''}`}>
          <div className="contact-emoji">{c.emoji}</div>
          <div>
            <div className="contact-name">{c.nome}</div>
            <div className="contact-tel">{c.tel}</div>
          </div>
        </a>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   COMPONENTE: Dashboard
═══════════════════════════════════════════════════════════ */
function Dashboard({ guest, onLogout }) {
  const [tab, setTab] = useState('home');

  const NAV = [
    { id:'home',     icon:'🏠', lbl:'Home'     },
    { id:'casa',     icon:'🛋️', lbl:'Casa'     },
    { id:'mangiare', icon:'🍽️', lbl:'Mangiare' },
    { id:'fare',     icon:'🌊', lbl:'Fare'     },
    { id:'contatti', icon:'📞', lbl:'Contatti' },
  ];

  return (
    <div className="dashboard">
      <div className="dash-header">
        <div className="header-top">
          <div className="header-brand">
            🌊 Marina Azul 15
            <span>Vasto Marina, Abruzzo</span>
          </div>
          <button className="logout-btn" onClick={onLogout}>Esci</button>
        </div>
        <div className="welcome-text">Ciao, {guest.name.split(' ')[0]}! 👋</div>
        <div className="welcome-sub">Benvenuto nel tuo soggiorno a Vasto Marina</div>
      </div>

      <div className="content">
        {tab === 'home'     && <><WeatherCard /><StayCard guest={guest} /></>}
        {tab === 'casa'     && <CasaTab />}
        {tab === 'mangiare' && <RistorantiTab />}
        {tab === 'fare'     && <AttivitaTab />}
        {tab === 'contatti' && <ContattiTab />}
      </div>

      <div className="bottom-nav">
        {NAV.map(n => (
          <button
            key={n.id}
            className={`nav-item${tab === n.id ? ' active' : ''}`}
            onClick={() => setTab(n.id)}
          >
            <span className="nav-icon">{n.icon}</span>
            {n.lbl}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════ */
function App() {
  const [guest, setGuest] = useState(null);
  return guest
    ? <Dashboard guest={guest} onLogout={() => setGuest(null)} />
    : <LoginPage onLogin={setGuest} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
